<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bahaa Meghnous | Black Belt</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
    color: #e0f7ff;
    position: relative;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, rgba(255,0,0,0.08), transparent);
    pointer-events: none;
    z-index: -1;
    animation: pulseGlow 8s infinite;
}

@keyframes pulseGlow {
    0% { opacity: 0.2; transform: scale(1);}
    100% { opacity: 0.6; transform: scale(1.3);}
}

.admin-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: bold;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    border: 1px solid #ff4d4d;
    color: #ffaa77;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 100;
    letter-spacing: 1px;
}

.admin-btn:hover {
    background: #ff4d4d;
    color: black;
    border-color: white;
    transform: scale(1.05);
    box-shadow: 0 0 15px #ff4d4d;
}

.box {
    background: rgba(12, 12, 20, 0.65);
    backdrop-filter: blur(14px);
    padding: 50px 70px;
    border-radius: 55px;
    text-align: center;
    border: 1px solid rgba(255, 80, 80, 0.4);
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
    transition: transform 0.3s ease;
    max-width: 90%;
    width: 500px;
}

.box:hover {
    transform: translateY(-8px);
    border-color: #ffaa55;
}

.circle img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ff6666;
    box-shadow: 0 0 30px rgba(255, 80, 80, 0.5);
    transition: 0.3s;
}

.circle img:hover {
    transform: scale(1.05);
    border-color: #ffaa55;
    box-shadow: 0 0 40px #ffaa55;
}

.box h2 {
    margin: 25px 0 20px;
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #ff4d4d, #ffbc00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 1px;
}

#enterBtn {
    margin-top: 20px;
    padding: 14px 32px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    border: none;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 20px rgba(255, 80, 80, 0.6);
    letter-spacing: 1px;
}

#enterBtn:hover {
    transform: scale(1.08);
    background: linear-gradient(135deg, #ffaa00, #ff4d4d);
    box-shadow: 0 0 35px #ffaa55;
}

@media (max-width: 550px) {
    .box { padding: 35px 25px; width: 90%; }
    .circle img { width: 110px; height: 110px; }
    .box h2 { font-size: 22px; }
    #enterBtn { padding: 12px 24px; font-size: 16px; }
    .admin-btn { top: 12px; left: 12px; padding: 5px 12px; font-size: 10px; }
}

.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    color: #000;
    padding: 12px 24px;
    border-radius: 50px;
    font-weight: bold;
    z-index: 1000;
    animation: slideUp 0.5s ease, fadeOut 0.5s ease 3s forwards;
    text-align: center;
    font-size: 14px;
}

@keyframes slideUp {
    from { transform: translateX(-50%) translateY(100px); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}
</style>
</head>
<body>

<button class="admin-btn" onclick="openAdminPanel()">● ADMIN ACCESS</button>

<div class="box">
    <div class="circle">
        <img src="images/1777276122460.png" onerror="this.src='https://via.placeholder.com/150?text=Bahaa'">
    </div>
    <h2>⚡ BAHAA MEGHNOUS ⚡</h2>
    <button id="enterBtn">🥋 TRACKING / ENTRANCE 🥋</button>
</div>

<script type="module">

// ==================================================
// 🔥 FIREBASE CONFIGURATION
// ==================================================
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "bahaa-tracking-bc38c.firebaseapp.com",
    databaseURL: "https://bahaa-tracking-bc38c-default-rtdb.firebaseio.com",
    projectId: "bahaa-tracking-bc38c",
    storageBucket: "bahaa-tracking-bc38c.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
console.log("✅ Firebase initialized");

function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
}

// ==================================================
// 📱 GET DEVICE NAME
// ==================================================

function getDeviceName() {
    const ua = navigator.userAgent;
    
    if (ua.includes("iPhone15")) return "iPhone 15 Series";
    if (ua.includes("iPhone14")) return "iPhone 14 Series";
    if (ua.includes("iPhone13")) return "iPhone 13 Series";
    if (ua.includes("iPhone12")) return "iPhone 12 Series";
    if (ua.includes("iPhone11")) return "iPhone 11 Series";
    if (ua.includes("iPhone X")) return "iPhone X";
    if (ua.includes("iPhone")) return "iPhone";
    if (ua.includes("iPad")) return "iPad";
    if (ua.includes("SM-")) {
        const match = ua.match(/SM-[A-Z0-9]+/);
        if (match) return `Samsung ${match[0]}`;
    }
    if (ua.includes("Pixel")) return "Google Pixel";
    if (ua.includes("OnePlus")) return "OnePlus";
    if (ua.includes("Mi ") || ua.includes("Redmi")) return "Xiaomi / Redmi";
    if (ua.includes("Windows NT")) return "Windows PC / Laptop";
    if (ua.includes("Mac OS X")) return "Apple Mac";
    if (ua.includes("Linux") && !ua.includes("Android")) return "Linux Computer";
    if (ua.includes("Android")) return "Android Device";
    return "Unknown Device";
}

// ==================================================
// 📱 BASIC DEVICE INFO
// ==================================================

function getBasicDeviceInfo() {
    const ua = navigator.userAgent;
    
    let deviceType = "Desktop";
    let deviceCategory = "Computer";
    let deviceModel = "Unknown";
    let brand = "Unknown";
    
    if (/iPhone/i.test(ua)) {
        deviceType = "Mobile";
        deviceCategory = "Smartphone";
        brand = "Apple";
        deviceModel = getDeviceName();
    }
    else if (/iPad/i.test(ua)) {
        deviceType = "Tablet";
        deviceCategory = "Tablet";
        brand = "Apple";
        deviceModel = "iPad";
    }
    else if (/Android/i.test(ua)) {
        if (/Mobile/i.test(ua)) {
            deviceType = "Mobile";
            deviceCategory = "Smartphone";
        } else {
            deviceType = "Tablet";
            deviceCategory = "Tablet";
        }
        brand = "Android";
        deviceModel = getDeviceName();
    }
    else if (/Windows NT/i.test(ua)) {
        deviceCategory = "PC / Laptop";
        brand = "Microsoft";
        deviceModel = getDeviceName();
    }
    else if (/Mac OS X/i.test(ua)) {
        deviceCategory = "PC / Laptop";
        brand = "Apple";
        deviceModel = "Mac";
    }
    
    // Operating System
    let os = "Unknown";
    let osVersion = "";
    
    if (ua.includes("Windows NT 10.0")) { os = "Windows"; osVersion = "10/11"; }
    else if (ua.includes("Windows NT 6.3")) { os = "Windows"; osVersion = "8.1"; }
    else if (ua.includes("Windows NT 6.2")) { os = "Windows"; osVersion = "8"; }
    else if (ua.includes("Windows NT 6.1")) { os = "Windows"; osVersion = "7"; }
    else if (ua.includes("Mac OS X")) { os = "macOS"; }
    else if (ua.includes("Android")) { os = "Android"; }
    else if (ua.includes("iPhone OS")) { os = "iOS"; }
    else if (ua.includes("iPad")) { os = "iPadOS"; }
    
    // Browser
    let browser = "Unknown";
    let browserVersion = "";
    
    if (ua.includes("Edg/")) { browser = "Microsoft Edge"; }
    else if (ua.includes("Chrome/") && !ua.includes("Edg/")) { browser = "Google Chrome"; }
    else if (ua.includes("Firefox/")) { browser = "Mozilla Firefox"; }
    else if (ua.includes("Safari/") && !ua.includes("Chrome/")) { browser = "Apple Safari"; }
    
    return {
        deviceName: getDeviceName(),
        deviceType, deviceCategory, deviceBrand: brand, deviceModel,
        operatingSystem: os, osVersion, fullOS: osVersion ? `${os} ${osVersion}` : os,
        browser, browserVersion, fullBrowser: browserVersion ? `${browser} ${browserVersion}` : browser,
        language: navigator.language || "Unknown",
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        userAgent: ua
    };
}

// ==================================================
// 🚀 ADVANCED DEVICE INFO (CPU, RAM, Battery, Network)
// ==================================================

async function getAdvancedDeviceInfo() {
    const ua = navigator.userAgent;
    
    let cpuCores = navigator.hardwareConcurrency || "Unknown";
    let cpuArchitecture = "Unknown";
    
    if (ua.includes("x64") || ua.includes("x86_64")) cpuArchitecture = "64-bit";
    else if (ua.includes("arm64") || ua.includes("aarch64")) cpuArchitecture = "ARM64";
    
    let deviceRAM = "Unknown";
    if (navigator.deviceMemory) deviceRAM = `${navigator.deviceMemory} GB`;
    
    let batteryLevel = "Unknown";
    let isCharging = "Unknown";
    
    if (navigator.getBattery) {
        try {
            const battery = await navigator.getBattery();
            batteryLevel = `${Math.floor(battery.level * 100)}%`;
            isCharging = battery.charging ? "Yes 🔌" : "No 🔋";
        } catch(e) {}
    }
    
    let connectionType = "Unknown";
    let connectionSpeed = "Unknown";
    const conn = navigator.connection || navigator.mozConnection;
    if (conn) {
        if (conn.effectiveType === '4g') connectionType = "4G/LTE";
        else if (conn.effectiveType === '3g') connectionType = "3G";
        else if (conn.effectiveType === '2g') connectionType = "2G";
        else if (conn.type === 'wifi') connectionType = "WiFi";
        connectionSpeed = conn.downlink ? `${conn.downlink} Mbps` : "Unknown";
    }
    
    const screenInfo = {
        resolution: `${screen.width}x${screen.height}`,
        orientation: screen.orientation ? screen.orientation.type : (window.innerHeight > window.innerWidth ? "portrait" : "landscape")
    };
    
    return {
        cpu: { cores: cpuCores, architecture: cpuArchitecture },
        ram: deviceRAM,
        battery: { level: batteryLevel, isCharging: isCharging },
        network: { type: connectionType, speed: connectionSpeed },
        screen: screenInfo
    };
}

// ==================================================
// 🌍 IMPROVED LOCATION INFO - MULTIPLE APIs
// ==================================================

async function getLocationInfo() {
    // المحاولة الأولى: ip-api.com (مجاني وسريع جداً)
    try {
        const response = await fetch('http://ip-api.com/json/', {
            mode: 'cors',
            headers: { 'Content-Type': 'application/json' }
        });
        const data = await response.json();
        if (data && data.status === 'success') {
            console.log("✅ Location from ip-api.com:", data);
            return {
                country: data.country || "Unknown",
                countryCode: data.countryCode || "UN",
                city: data.city || "Unknown",
                region: data.regionName || "Unknown",
                postalCode: data.zip || "",
                isp: data.isp || "Unknown",
                latitude: data.lat || null,
                longitude: data.lon || null,
                source: 'ip-api.com'
            };
        }
    } catch(e) { console.log("ip-api.com failed:", e); }
    
    // المحاولة الثانية: ipapi.co
    try {
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        if (data && data.country_name) {
            console.log("✅ Location from ipapi.co:", data);
            return {
                country: data.country_name || "Unknown",
                countryCode: data.country_code || "UN",
                city: data.city || "Unknown",
                region: data.region || "Unknown",
                postalCode: data.postal || "",
                isp: data.org || "Unknown",
                latitude: data.latitude || null,
                longitude: data.longitude || null,
                source: 'ipapi.co'
            };
        }
    } catch(e) { console.log("ipapi.co failed:", e); }
    
    // المحاولة الثالثة: ipwho.is
    try {
        const response = await fetch('https://ipwho.is/');
        const data = await response.json();
        if (data && data.success !== false) {
            console.log("✅ Location from ipwho.is:", data);
            return {
                country: data.country || "Unknown",
                countryCode: data.country_code || "UN",
                city: data.city || "Unknown",
                region: data.region || "Unknown",
                postalCode: data.postal || "",
                isp: data.connection?.isp || "Unknown",
                latitude: data.latitude || null,
                longitude: data.longitude || null,
                source: 'ipwho.is'
            };
        }
    } catch(e) { console.log("ipwho.is failed:", e); }
    
    // المحاولة الرابعة: geoplugin.net
    try {
        const response = await fetch('http://www.geoplugin.net/json.gp');
        const data = await response.json();
        if (data && data.geoplugin_countryName) {
            console.log("✅ Location from geoplugin:", data);
            return {
                country: data.geoplugin_countryName || "Unknown",
                countryCode: data.geoplugin_countryCode || "UN",
                city: data.geoplugin_city || "Unknown",
                region: data.geoplugin_region || "Unknown",
                postalCode: "",
                isp: "Unknown",
                latitude: data.geoplugin_latitude || null,
                longitude: data.geoplugin_longitude || null,
                source: 'geoplugin.net'
            };
        }
    } catch(e) { console.log("geoplugin failed:", e); }
    
    console.log("⚠️ All location APIs failed");
    return {
        country: "Unknown",
        countryCode: "UN",
        city: "Unknown",
        region: "Unknown",
        postalCode: "",
        isp: "Unknown",
        latitude: null,
        longitude: null,
        source: 'none'
    };
}

// ==================================================
// 🖨️ GENERATE FINGERPRINT
// ==================================================

function generateFingerprint() {
    const components = [
        navigator.userAgent,
        navigator.language,
        screen.width + 'x' + screen.height,
        screen.colorDepth,
        navigator.hardwareConcurrency || 'unknown',
        navigator.deviceMemory || 'unknown'
    ];
    let hash = 0;
    const str = components.join('|');
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
    }
    return Math.abs(hash).toString(36);
}

// ==================================================
// 📝 REGISTER VISITOR
// ==================================================

async function registerAndNavigate() {
    try {
        console.log("🔄 Registering new visit...");
        
        const btn = document.getElementById("enterBtn");
        btn.innerHTML = "⏳ PROCESSING...";
        btn.disabled = true;
        
        // Get current time
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        
        const fullDateTime = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        const dateOnly = `${year}-${month}-${day}`;
        const timeOnly = `${hours}:${minutes}:${seconds}`;
        
        // Get all info
        const basicInfo = getBasicDeviceInfo();
        const advancedInfo = await getAdvancedDeviceInfo();
        const location = await getLocationInfo();  // المحسن
        const fingerprint = generateFingerprint();
        
        // Show location info to user
        if (location.country !== "Unknown") {
            showToast(`📍 ${location.country} - ${location.city} via ${location.isp?.substring(0, 20)}`);
        } else {
            showToast(`⚠️ Location info unavailable - Check your connection`);
        }
        
        // Get device stats
        const deviceStatsRef = ref(database, `deviceStats/${fingerprint}`);
        const snapshot = await get(deviceStatsRef);
        let visitCount = 1;
        let previousVisits = [];
        
        if (snapshot.exists()) {
            const existingData = snapshot.val();
            visitCount = (existingData.visitCount || 0) + 1;
            previousVisits = existingData.visits || [];
        }
        
        // Prepare data
        const visitData = {
            visitId: `${fingerprint}_${Date.now()}`,
            timestamp: now.getTime(),
            dateTime: fullDateTime,
            date: dateOnly,
            time: timeOnly,
            
            deviceName: basicInfo.deviceName,
            deviceType: basicInfo.deviceType,
            deviceCategory: basicInfo.deviceCategory,
            deviceBrand: basicInfo.deviceBrand,
            deviceModel: basicInfo.deviceModel,
            operatingSystem: basicInfo.operatingSystem,
            fullOS: basicInfo.fullOS,
            browser: basicInfo.browser,
            fullBrowser: basicInfo.fullBrowser,
            
            cpuCores: advancedInfo.cpu.cores,
            cpuArchitecture: advancedInfo.cpu.architecture,
            ram: advancedInfo.ram,
            batteryLevel: advancedInfo.battery.level,
            isCharging: advancedInfo.battery.isCharging,
            connectionType: advancedInfo.network.type,
            connectionSpeed: advancedInfo.network.speed,
            screenResolution: advancedInfo.screen.resolution,
            screenOrientation: advancedInfo.screen.orientation,
            
            // LOCATION INFO (FIXED)
            country: location.country,
            countryCode: location.countryCode,
            city: location.city,
            region: location.region,
            postalCode: location.postalCode,
            isp: location.isp,
            latitude: location.latitude,
            longitude: location.longitude,
            locationSource: location.source,
            
            language: basicInfo.language,
            timezone: basicInfo.timezone,
            userAgent: basicInfo.userAgent,
            deviceFingerprint: fingerprint,
            visitNumber: visitCount
        };
        
        console.log("✅ Visit data prepared:", visitData);
        
        // Save to Firebase
        const visitsRef = ref(database, "visits");
        await push(visitsRef, visitData);
        
        // Update device stats
        const newVisitRecord = {
            timestamp: now.getTime(),
            dateTime: fullDateTime,
            date: dateOnly,
            time: timeOnly
        };
        
        previousVisits.unshift(newVisitRecord);
        if (previousVisits.length > 20) previousVisits = previousVisits.slice(0, 20);
        
        await set(deviceStatsRef, {
            deviceName: basicInfo.deviceName,
            deviceFingerprint: fingerprint,
            deviceType: basicInfo.deviceType,
            deviceBrand: basicInfo.deviceBrand,
            deviceModel: basicInfo.deviceModel,
            operatingSystem: basicInfo.fullOS,
            browser: basicInfo.fullBrowser,
            screenResolution: advancedInfo.screen.resolution,
            cpuCores: advancedInfo.cpu.cores,
            ram: advancedInfo.ram,
            batteryLevel: advancedInfo.battery.level,
            country: location.country,
            city: location.city,
            isp: location.isp,
            firstVisit: previousVisits[previousVisits.length - 1]?.dateTime || fullDateTime,
            lastVisit: fullDateTime,
            visitCount: visitCount,
            visits: previousVisits
        });
        
        console.log(`✅ Device ${fingerprint} has ${visitCount} visits`);
        
        sessionStorage.setItem('currentVisitor', JSON.stringify({
            deviceName: basicInfo.deviceName,
            deviceType: basicInfo.deviceType,
            visitNumber: visitCount,
            dateTime: fullDateTime,
            country: location.country,
            city: location.city
        }));
        
        window.location.href = "index2.html";
        
    } catch(error) {
        console.error("❌ Registration error:", error);
        showToast("❌ Error occurred! Please try again.");
        const btn = document.getElementById("enterBtn");
        btn.innerHTML = "🥋 TRACKING / ENTRANCE 🥋";
        btn.disabled = false;
    }
}

document.getElementById("enterBtn").addEventListener("click", (e) => {
    e.preventDefault();
    registerAndNavigate();
});
