<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
    color: #e0f7ff;
    position: relative;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, rgba(255,0,0,0.08), transparent);
    pointer-events: none;
    z-index: -1;
    animation: pulseGlow 8s infinite;
}

@keyframes pulseGlow {
    0% { opacity: 0.2; transform: scale(1);}
    100% { opacity: 0.6; transform: scale(1.3);}
}

.admin-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: bold;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    border: 1px solid #ff4d4d;
    color: #ffaa77;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 100;
    letter-spacing: 1px;
}

.admin-btn:hover {
    background: #ff4d4d;
    color: black;
    border-color: white;
    transform: scale(1.05);
    box-shadow: 0 0 15px #ff4d4d;
}

.box {
    background: rgba(12, 12, 20, 0.65);
    backdrop-filter: blur(14px);
    padding: 50px 70px;
    border-radius: 55px;
    text-align: center;
    border: 1px solid rgba(255, 80, 80, 0.4);
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
    transition: transform 0.3s ease;
    max-width: 90%;
    width: 500px;
}

.box:hover {
    transform: translateY(-8px);
    border-color: #ffaa55;
}

.circle img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ff6666;
    box-shadow: 0 0 30px rgba(255, 80, 80, 0.5);
    transition: 0.3s;
}

.circle img:hover {
    transform: scale(1.05);
    border-color: #ffaa55;
    box-shadow: 0 0 40px #ffaa55;
}

.box h2 {
    margin: 25px 0 20px;
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #ff4d4d, #ffbc00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 1px;
}

#enterBtn {
    margin-top: 20px;
    padding: 14px 32px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    border: none;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 20px rgba(255, 80, 80, 0.6);
    letter-spacing: 1px;
}

#enterBtn:hover {
    transform: scale(1.08);
    background: linear-gradient(135deg, #ffaa00, #ff4d4d);
    box-shadow: 0 0 35px #ffaa55;
}

@media (max-width: 550px) {
    .box { padding: 35px 25px; width: 90%; }
    .circle img { width: 110px; height: 110px; }
    .box h2 { font-size: 22px; }
    #enterBtn { padding: 12px 24px; font-size: 16px; }
    .admin-btn { top: 12px; left: 12px; padding: 5px 12px; font-size: 10px; }
}

.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    color: #000;
    padding: 12px 24px;
    border-radius: 50px;
    font-weight: bold;
    z-index: 1000;
    animation: slideUp 0.5s ease, fadeOut 0.5s ease 3s forwards;
    text-align: center;
    font-size: 14px;
}

@keyframes slideUp {
    from { transform: translateX(-50%) translateY(100px); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}
</style>

<body>

<button class="admin-btn" onclick="openAdminPanel()">● ADMIN ACCESS</button>

<div class="box">

        <img src="images/1777276122460.png" onerror="this.src='https://via.placeholder.com/150?text=Bahaa'">
    </div>
    <h2>⚡ BAHAA MEGHNOUS ⚡</h2>
    <button id="enterBtn">🥋 TRACKING / ENTRANCE 🥋</button>
</div>

<script type="module">

// ==================================================
// 🔥 FIREBASE CONFIGURATION
// ==================================================
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "bahaa-tracking-bc38c.firebaseapp.com",
    databaseURL: "https://bahaa-tracking-bc38c-default-rtdb.firebaseio.com",
    projectId: "bahaa-tracking-bc38c",
    storageBucket: "bahaa-tracking-bc38c.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
console.log("✅ Firebase initialized");

function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
}

// ==================================================
// 📱 GET DEVICE NAME
// ==================================================

function getDeviceName() {
    const ua = navigator.userAgent;
    
    if (ua.includes("iPhone15")) return "iPhone 15 Series";
    if (ua.includes("iPhone14")) return "iPhone 14 Series";
    if (ua.includes("iPhone13")) return "iPhone 13 Series";
    if (ua.includes("iPhone12")) return "iPhone 12 Series";
    if (ua.includes("iPhone11")) return "iPhone 11 Series";
    if (ua.includes("iPhone")) return "iPhone";
    if (ua.includes("iPad")) return "iPad";
    
    const samsungMatch = ua.match(/SM-([A-Z0-9]+)/i);
    if (samsungMatch) return `Samsung Galaxy ${samsungMatch[1]}`;
    
    if (ua.includes("Redmi Note 13")) return "Xiaomi Redmi Note 13";
    if (ua.includes("Redmi Note 12")) return "Xiaomi Redmi Note 12";
    if (ua.includes("Redmi Note 11")) return "Xiaomi Redmi Note 11";
    if (ua.includes("Redmi Note 10")) return "Xiaomi Redmi Note 10";
    if (ua.includes("Redmi Note 9")) return "Xiaomi Redmi Note 9";
    if (ua.includes("Redmi Note 8")) return "Xiaomi Redmi Note 8";
    if (ua.includes("Redmi 9")) return "Xiaomi Redmi 9";
    if (ua.includes("Redmi 8")) return "Xiaomi Redmi 8";
    if (ua.includes("Mi 11")) return "Xiaomi Mi 11";
    if (ua.includes("Mi 10")) return "Xiaomi Mi 10";
    if (ua.includes("POCO")) return "Xiaomi POCO";
    
    if (ua.includes("Pixel 8")) return "Google Pixel 8";
    if (ua.includes("Pixel 7")) return "Google Pixel 7";
    if (ua.includes("Pixel 6")) return "Google Pixel 6";
    if (ua.includes("Pixel")) return "Google Pixel";
    
    if (ua.includes("OnePlus")) return "OnePlus";
    if (ua.includes("Windows NT")) return "Windows PC / Laptop";
    if (ua.includes("Mac OS X")) return "Apple Mac";
    
    if (ua.includes("Android")) {
        const match = ua.match(/; (.+?) Build/);
        if (match) return match[1];
        return "Android Device";
    }
    
    return "Unknown Device";
}

// ==================================================
// 📱 OPERATING SYSTEM WITH ANDROID VERSION (FIXED)
// ==================================================

function getOperatingSystem() {
    const ua = navigator.userAgent;
    
    // Windows
    if (ua.includes("Windows NT 10.0")) return "Windows 10/11";
    if (ua.includes("Windows NT 6.3")) return "Windows 8.1";
    if (ua.includes("Windows NT 6.2")) return "Windows 8";
    if (ua.includes("Windows NT 6.1")) return "Windows 7";
    if (ua.includes("Windows")) return "Windows";
    
    // macOS
    if (ua.includes("Mac OS X")) {
        const match = ua.match(/Mac OS X ([0-9_]+)/);
        if (match) return `macOS ${match[1].replace(/_/g, '.')}`;
        return "macOS";
    }
    
    // iOS
    if (ua.includes("iPhone OS")) {
        const match = ua.match(/iPhone OS ([0-9_]+)/);
        if (match) return `iOS ${match[1].replace(/_/g, '.')}`;
        return "iOS";
    }
    
    // iPadOS
    if (ua.includes("iPad")) {
        const match = ua.match(/OS ([0-9_]+)/);
        if (match) return `iPadOS ${match[1].replace(/_/g, '.')}`;
        return "iPadOS";
    }
    
    // ==============================================
    // ANDROID VERSION - FIXED (يظهر الرقم بالكامل)
    // ==============================================
    if (ua.includes("Android")) {
        // طريقة 1: البحث عن Android 10, Android 11, Android 12, Android 13, Android 14
        const androidMatch = ua.match(/Android ([0-9.]+)/);
        if (androidMatch) {
            const version = androidMatch[1];
            const majorVersion = version.split('.')[0];
            
            // أسماء Android الرسمية مع الأرقام
            const versionNames = {
                "5": "Lollipop 5.0",
                "6": "Marshmallow 6.0",
                "7": "Nougat 7.0",
                "8": "Oreo 8.0",
                "9": "Pie 9.0",
                "10": "Android 10 (Q)",
                "11": "Android 11 (R)",
                "12": "Android 12 (S)",
                "13": "Android 13 (Tiramisu)",
                "14": "Android 14 (Upside Down Cake)",
                "15": "Android 15 (Vanilla Ice Cream)"
            };
            
            if (versionNames[majorVersion]) {
                return versionNames[majorVersion];
            }
            return `Android ${version}`;
        }
        
        // طريقة 2: البحث عن API level
        const apiMatch = ua.match(/API ([0-9]+)/);
        if (apiMatch) {
            const api = apiMatch[1];
            const apiToVersion = {
                "29": "Android 10 (Q)",
                "30": "Android 11 (R)",
                "31": "Android 12 (S)",
                "32": "Android 12L",
                "33": "Android 13 (Tiramisu)",
                "34": "Android 14 (Upside Down Cake)",
                "35": "Android 15"
            };
            if (apiToVersion[api]) return apiToVersion[api];
            return `Android (API ${api})`;
        }
        
        return "Android";
    }
    
    // Linux
    if (ua.includes("Linux")) return "Linux";
    
    return "Unknown";
}

// ==================================================
// 📱 BROWSER INFO
// ==================================================

function getBrowserInfo() {
    const ua = navigator.userAgent;
    if (ua.includes("Edg/")) return "Microsoft Edge";
    if (ua.includes("Chrome/") && !ua.includes("Edg/")) return "Google Chrome";
    if (ua.includes("Firefox/")) return "Mozilla Firefox";
    if (ua.includes("Safari/") && !ua.includes("Chrome/")) return "Apple Safari";
    if (ua.includes("Opera/") || ua.includes("OPR/")) return "Opera";
    return "Unknown";
}

// ==================================================
// 📱 BASIC DEVICE INFO
// ==================================================

function getBasicDeviceInfo() {
    const ua = navigator.userAgent;
    
    let deviceType = "Desktop";
    if (/iPhone|Android.*Mobile/i.test(ua)) deviceType = "Mobile";
    else if (/iPad|Android(?!.*Mobile)/i.test(ua)) deviceType = "Tablet";
    
    let brand = "Unknown";
    if (ua.includes("iPhone") || ua.includes("iPad")) brand = "Apple";
    else if (ua.includes("SM-")) brand = "Samsung";
    else if (ua.includes("Mi ") || ua.includes("Redmi")) brand = "Xiaomi";
    else if (ua.includes("Pixel")) brand = "Google";
    else if (ua.includes("OnePlus")) brand = "OnePlus";
    else if (ua.includes("Windows")) brand = "Microsoft";
    else if (ua.includes("Mac")) brand = "Apple";
    
    return {
        deviceName: getDeviceName(),
        deviceType: deviceType,
        deviceBrand: brand,
        deviceModel: getDeviceName(),
        operatingSystem: getOperatingSystem(),
        browser: getBrowserInfo(),
        language: navigator.language || "Unknown",
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        userAgent: ua
    };
}

// ==================================================
// 🚀 ADVANCED DEVICE INFO
// ==================================================

async function getAdvancedDeviceInfo() {
    const ua = navigator.userAgent;
    
    let cpuCores = navigator.hardwareConcurrency || "Unknown";
    let cpuArchitecture = "Unknown";
    if (ua.includes("x64") || ua.includes("x86_64")) cpuArchitecture = "64-bit";
    else if (ua.includes("arm64") || ua.includes("aarch64")) cpuArchitecture = "ARM64";
    
    let deviceRAM = "Unknown";
    if (navigator.deviceMemory) deviceRAM = `${navigator.deviceMemory} GB`;
    
    let batteryLevel = "Unknown";
    let isCharging = "Unknown";
    
    try {
        if (navigator.getBattery) {
            const battery = await navigator.getBattery();
            batteryLevel = `${Math.floor(battery.level * 100)}%`;
            isCharging = battery.charging ? "Yes 🔌" : "No 🔋";
        }
    } catch(e) {}
    
    let connectionType = "Unknown";
    let connectionSpeed = "Unknown";
    
    const connection = navigator.connection || navigator.mozConnection;
    if (connection) {
        if (connection.type === 'wifi') connectionType = "WiFi 📡";
        else if (connection.type === 'cellular') {
            if (connection.effectiveType === '4g') connectionType = "4G/LTE 📶";
            else if (connection.effectiveType === '3g') connectionType = "3G 📶";
            else connectionType = "Mobile Data 📱";
        } else if (connection.effectiveType) {
            if (connection.effectiveType === '4g') connectionType = "4G/LTE 📶";
            else if (connection.effectiveType === '3g') connectionType = "3G 📶";
            else connectionType = connection.effectiveType;
        }
        if (connection.downlink) connectionSpeed = `${connection.downlink} Mbps`;
    }
    
    const screenInfo = {
        resolution: `${screen.width}x${screen.height}`,
        orientation: screen.orientation ? screen.orientation.type : (window.innerHeight > window.innerWidth ? "portrait" : "landscape")
    };
    
    return {
        cpu: { cores: cpuCores, architecture: cpuArchitecture },
        ram: deviceRAM,
        battery: { level: batteryLevel, isCharging: isCharging },
        network: { type: connectionType, speed: connectionSpeed },
        screen: screenInfo
    };
}

// ==================================================
// 🌍 LOCATION INFO
// ==================================================

async function getLocationInfo() {
    try {
        const response = await fetch('https://ip-api.com/json/');
        const data = await response.json();
        if (data && data.status === 'success') {
            return {
                country: data.country || "Unknown",
                city: data.city || "Unknown",
                region: data.regionName || "Unknown",
                isp: data.isp || "Unknown"
            };
        }
    } catch(e) {}
    
    try {
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        if (data && data.country_name) {
            return {
                country: data.country_name || "Unknown",
                city: data.city || "Unknown",
                region: data.region || "Unknown",
                isp: data.org || "Unknown"
            };
        }
    } catch(e) {}
    
    return {
        country: "Unknown",
        city: "Unknown",
        region: "Unknown",
        isp: "Unknown"
    };
}

// ==================================================
// 🖨️ FINGERPRINT
// ==================================================

function generateFingerprint() {
    const components = [
        navigator.userAgent,
        navigator.language,
        screen.width + 'x' + screen.height,
        screen.colorDepth,
        navigator.hardwareConcurrency || 'unknown',
        navigator.deviceMemory || 'unknown'
    ];
    let hash = 0;
    const str = components.join('|');
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
    }
    return Math.abs(hash).toString(36);
}

// ==================================================
// 📝 REGISTER VISITOR
// ==================================================

async function registerAndNavigate() {
    try {
        console.log("🔄 Registering new visit...");
        
        const btn = document.getElementById("enterBtn");
        btn.innerHTML = "⏳ PROCESSING...";
        btn.disabled = true;
        
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        
        const fullDateTime = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        const dateOnly = `${year}-${month}-${day}`;
        
        const basicInfo = getBasicDeviceInfo();
        const advancedInfo = await getAdvancedDeviceInfo();
        const location = await getLocationInfo();
        const fingerprint = generateFingerprint();
        
        console.log("📱 Operating System:", basicInfo.operatingSystem);
        
        if (location.country !== "Unknown") {
            showToast(`📍 ${location.country} - ${location.city}`);
        }
        
        const deviceStatsRef = ref(database, `deviceStats/${fingerprint}`);
        const snapshot = await get(deviceStatsRef);
        let visitCount = 1;
        let previousVisits = [];
        
        if (snapshot.exists()) {
            const existingData = snapshot.val();
            visitCount = (existingData.visitCount || 0) + 1;
            previousVisits = existingData.visits || [];
        }
        
        const visitData = {
            visitId: `${fingerprint}_${Date.now()}`,
            timestamp: now.getTime(),
            dateTime: fullDateTime,
            date: dateOnly,
            deviceName: basicInfo.deviceName,
            deviceType: basicInfo.deviceType,
            deviceBrand: basicInfo.deviceBrand,
            operatingSystem: basicInfo.operatingSystem,
            browser: basicInfo.browser,
            cpuCores: advancedInfo.cpu.cores,
            ram: advancedInfo.ram,
            batteryLevel: advancedInfo.battery.level,
            isCharging: advancedInfo.battery.isCharging,
            connectionType: advancedInfo.network.type,
            connectionSpeed: advancedInfo.network.speed,
            screenResolution: advancedInfo.screen.resolution,
            country: location.country,
            city: location.city,
            isp: location.isp,
            language: basicInfo.language,
            timezone: basicInfo.timezone,
            deviceFingerprint: fingerprint,
            visitNumber: visitCount
        };
        
        console.log("✅ Visit data:", visitData);
        
        const visitsRef = ref(database, "visits");
        await push(visitsRef, visitData);
        
        const newVisitRecord = {
            timestamp: now.getTime(),
            dateTime: fullDateTime,
            date: dateOnly
        };
        
        previousVisits.unshift(newVisitRecord);
        if (previousVisits.length > 20) previousVisits = previousVisits.slice(0, 20);
        
        await set(deviceStatsRef, {
            deviceName: basicInfo.deviceName,
            deviceFingerprint: fingerprint,
            deviceType: basicInfo.deviceType,
            deviceBrand: basicInfo.deviceBrand,
            operatingSystem: basicInfo.operatingSystem,
            browser: basicInfo.browser,
            screenResolution: advancedInfo.screen.resolution,
            cpuCores: advancedInfo.cpu.cores,
            ram: advancedInfo.ram,
            batteryLevel: advancedInfo.battery.level,
            country: location.country,
            city: location.city,
            isp: location.isp,
            firstVisit: previousVisits[previousVisits.length - 1]?.dateTime || fullDateTime,
            lastVisit: fullDateTime,
            visitCount: visitCount,
            visits: previousVisits
        });
        
        console.log(`✅ Device has ${visitCount} visits`);
        
        window.location.href = "index2.html";
        
    } catch(error) {
        console.error("❌ Error:", error);
        showToast("❌ Error occurred! Please try again.");
        const btn = document.getElementById("enterBtn");
        btn.innerHTML = "🥋 TRACKING / ENTRANCE 🥋";
        btn.disabled = false;
    }
}

// BUTTONS
// ==================================================

document.getElementById("enterBtn").addEventListener("click", (e) => {
    e.preventDefault();
    registerAndNavigate();
});
