<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Bahaa Meghnous | Black Belt</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 30% 10%, #0a0a1a, #020105, #000000);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: #e8e8ff;
    position: relative;
    overflow: hidden;
    padding: 16px;
}

/* ============================================ */
/* 👑 القناع الفخم العملاق - محسن للهاتف */
/* ============================================ */

.luxury-mask {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}

/* تحسين حركات القناع للهاتف - أخف وأقل استهلاكاً */
.giant-mask-1 {
    position: absolute;
    width: 150%;
    height: 150%;
    top: -25%;
    left: -25%;
    background-image: repeating-linear-gradient(
        0deg,
        rgba(255, 200, 50, 0.06) 0px,
        rgba(255, 200, 50, 0.06) 2px,
        transparent 2px,
        transparent 40px
    );
    transform: rotate(25deg);
    animation: driftSlow 25s linear infinite;
}

.giant-mask-2 {
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background-image: repeating-linear-gradient(
        90deg,
        rgba(255, 80, 80, 0.04) 0px,
        rgba(255, 80, 80, 0.04) 3px,
        transparent 3px,
        transparent 60px
    );
    transform: rotate(-15deg);
    animation: driftMedium 20s linear infinite reverse;
}

.giant-mask-3 {
    position: absolute;
    width: 180%;
    height: 180%;
    top: -40%;
    left: -40%;
    background-image: radial-gradient(circle at 30% 40%, rgba(255, 170, 85, 0.04) 2px, transparent 2px);
    background-size: 80px 80px;
    animation: pulseRotate 15s ease-in-out infinite;
}

.giant-mask-4 {
    position: absolute;
    width: 250%;
    height: 250%;
    top: -75%;
    left: -75%;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.08"><path fill="none" stroke="%23ffd700" stroke-width="1.5" d="M100,10 L190,55 L190,145 L100,190 L10,145 L10,55 Z"/><path fill="none" stroke="%23ff4444" stroke-width="1" d="M100,40 L160,70 L160,130 L100,160 L40,130 L40,70 Z"/><circle cx="100" cy="100" r="35" fill="none" stroke="%23ffaa55" stroke-width="1.5"/></svg>');
    background-repeat: repeat;
    background-size: 120px 120px;
    animation: rotateHuge 35s linear infinite;
}

.giant-mask-5 {
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: radial-gradient(ellipse at 40% 50%, rgba(255, 70, 70, 0.03) 0%, transparent 60%);
    animation: breatheGlow 10s ease-in-out infinite alternate;
}

.giant-mask-6 {
    position: absolute;
    width: 160%;
    height: 160%;
    top: -30%;
    left: -30%;
    background-image: repeating-linear-gradient(
        45deg,
        rgba(255, 200, 100, 0.05) 0px,
        rgba(255, 200, 100, 0.05) 4px,
        transparent 4px,
        transparent 50px
    );
    animation: slideDiagonal 30s linear infinite;
}

@keyframes driftSlow {
    0% { transform: rotate(25deg) translate(0, 0); }
    100% { transform: rotate(25deg) translate(60px, 60px); }
}

@keyframes driftMedium {
    0% { transform: rotate(-15deg) translate(0, 0); }
    100% { transform: rotate(-15deg) translate(-50px, 80px); }
}

@keyframes pulseRotate {
    0% { transform: rotate(0deg) scale(1); opacity: 0.5; }
    50% { transform: rotate(180deg) scale(1.1); opacity: 0.8; }
    100% { transform: rotate(360deg) scale(1); opacity: 0.5; }
}

@keyframes rotateHuge {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes breatheGlow {
    0% { opacity: 0.2; transform: scale(1); }
    100% { opacity: 0.6; transform: scale(1.15); }
}

@keyframes slideDiagonal {
    0% { transform: translate(0, 0); }
    100% { transform: translate(100px, -60px); }
}

body::before {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255, 60, 60, 0.08), rgba(255, 180, 40, 0.03), transparent);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
    animation: royalPulse 12s infinite alternate;
}

@keyframes royalPulse {
    0% { opacity: 0.2; width: 150%; height: 150%; }
    100% { opacity: 0.5; width: 230%; height: 230%; }
}

.sparkles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 2;
    background-image: radial-gradient(2px 2px at 20% 30%, rgba(255,215,0,0.3), transparent),
                      radial-gradient(2px 2px at 70% 85%, rgba(255,100,100,0.2), transparent);
    background-repeat: no-repeat;
    background-size: 150px 150px, 200px 200px;
    animation: sparkleMove 20s infinite alternate;
}

@keyframes sparkleMove {
    0% { background-position: 0% 0%, 0% 0%; }
    100% { background-position: 100% 100%, 50% 80%; }
}

/* زر admin - محسن للهاتف */
.admin-btn {
    position: fixed;
    top: 16px;
    left: 16px;
    padding: 8px 16px;
    font-size: 11px;
    font-weight: bold;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 200, 80, 0.7);
    color: #ffdd99;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 100;
    letter-spacing: 1px;
    font-family: monospace;
}

.admin-btn:active {
    transform: scale(0.95);
    background: #ffaa33;
    color: #0a0a1a;
}

/* الصندوق الرئيسي - محسن للهاتف */
.box {
    background: rgba(8, 8, 18, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 40px 24px;
    border-radius: 48px;
    text-align: center;
    border: 1.5px solid rgba(255, 180, 80, 0.5);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 80, 80, 0.15);
    transition: all 0.3s ease;
    max-width: 95%;
    width: 380px;
    z-index: 20;
    position: relative;
    margin: auto;
}

.box:active {
    transform: scale(0.99);
}

/* الصورة - محسنة للهاتف */
.circle img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #ff884d;
    box-shadow: 0 0 30px rgba(255, 100, 50, 0.5);
    transition: 0.3s;
}

.circle img:active {
    transform: scale(0.98);
}

/* العنوان - في سطر واحد على الهاتف أيضاً */
.box h2 {
    margin: 20px 0 20px;
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, #ff5533, #ffcc44, #ffaa33);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 1px;
    white-space: nowrap;
}

/* الزر الرئيسي - محسن للهاتف */
#enterBtn {
    margin-top: 20px;
    padding: 14px 28px;
    font-size: 18px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, #dd4422, #ffaa33, #ffcc44);
    border: none;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 25px rgba(255, 100, 50, 0.5);
    letter-spacing: 1px;
    font-family: inherit;
    width: 100%;
    max-width: 280px;
}

#enterBtn:active {
    transform: scale(0.97);
    background: linear-gradient(135deg, #ffaa33, #dd4422);
    box-shadow: 0 0 20px #ffaa55;
}

/* Toast ترحيبي محسن للهاتف */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #dd4422, #ffaa33);
    color: #0a0a1a;
    padding: 12px 24px;
    border-radius: 50px;
    font-weight: bold;
    font-size: 13px;
    z-index: 1000;
    animation: slideUp 0.5s ease, fadeOut 0.4s ease 2.5s forwards;
    text-align: center;
    letter-spacing: 0.5px;
    box-shadow: 0 0 20px rgba(255, 100, 50, 0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,200,0.3);
    white-space: nowrap;
}

@keyframes slideUp {
    from { transform: translateX(-50%) translateY(60px); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* ============================================ */
/* 📱 تحسينات خاصة للهواتف الصغيرة جداً */
/* ============================================ */

@media (max-width: 480px) {
    body {
        padding: 12px;
    }
    
    .box {
        padding: 30px 20px;
        border-radius: 40px;
        width: 100%;
        max-width: 340px;
    }
    
    .circle img {
        width: 100px;
        height: 100px;
    }
    
    .box h2 {
        font-size: 18px;
        white-space: normal;
        line-height: 1.3;
    }
    
    #enterBtn {
        padding: 12px 24px;
        font-size: 16px;
        max-width: 240px;
    }
    
    .admin-btn {
        top: 12px;
        left: 12px;
        padding: 6px 12px;
        font-size: 10px;
    }
    
    .toast {
        padding: 10px 20px;
        font-size: 11px;
        white-space: normal;
        max-width: 90%;
        text-align: center;
    }
}

/* للشاشات المتوسطة (تابلت صغير) */
@media (min-width: 481px) and (max-width: 768px) {
    .box {
        padding: 45px 35px;
        max-width: 420px;
    }
    
    .circle img {
        width: 130px;
        height: 130px;
    }
    
    .box h2 {
        font-size: 24px;
    }
    
    #enterBtn {
        padding: 14px 32px;
        font-size: 18px;
    }
}

/* دعم الوضع الداكن في المتصفح */
@media (prefers-color-scheme: dark) {
    body {
        background: radial-gradient(circle at 30% 10%, #0a0a1a, #020105, #000000);
    }
}

/* إزالة شريط التمرير الأفقي */
html {
    overflow-x: hidden;
}

/* تحسين اللمس للأزرار */
button {
    cursor: pointer;
    touch-action: manipulation;
}

/* تحسين ظهور الصفحة كـ PWA */
@media (display-mode: standalone) {
    body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
    }
    
    .admin-btn {
        top: max(16px, env(safe-area-inset-top));
    }
}
</style>
</head>

</html>
