<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Compte Bahaa</title>

<style>

#h {
    margin-top: 20px;
    padding: 12px 28px;
    font-size: 16px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #00cfff, #0099ff);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(0, 200, 255, 0.4);
}

#h:hover {
    transform: scale(1.08);
}

body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #020202);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    color: #e0f7ff;
}

.admin-btn {
    position: fixed;
    top: 10px;
    left: 10px;
    padding: 6px 10px;
    font-size: 11px;
    background: rgba(0, 200, 255, 0.2);
    border: 1px solid #00cfff;
    color: #00cfff;
    border-radius: 6px;
    cursor: pointer;
}

.box {
    background: rgba(255, 255, 255, 0.08);
    padding: 40px 60px;
    border-radius: 20px;
    text-align: center;
}

.circle img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
}

</style>
</head>

<body>

<button class="admin-btn" onclick="openAdmin()">● Admin</button>

<div class="box">
    <div class="circle">
        <img src="images/1769073886836.webp">
    </div>

    <h2>La page de Bahaa</h2>

    <button id="h">Tracking</button>
</div>

<!-- ================= LOCAL STORAGE (بديل Firebase) ================= -->
<script>

document.getElementById("h").addEventListener("click", () => {

    // 📌 بيانات الزائر
    const visitor = {
        time: new Date().toLocaleString(),
        type: /Mobi|Android/i.test(navigator.userAgent) ? "Mobile 📱" : "PC 💻",
        device: navigator.userAgent
    };

    // 📌 تخزين البيانات محليًا
    let visitors = JSON.parse(localStorage.getItem("visitors")) || [];
    visitors.push(visitor);
    localStorage.setItem("visitors", JSON.stringify(visitors));

    // 🚀 الانتقال للصفحة الثانية
    window.location.href = "./index (2).html";
});

// 🔐 زر الأدمن
window.openAdmin = function () {
    let pass = prompt("أدخل كلمة السر:");

    if (pass === "041263312") {
        window.location.href = "index3.html";
    } else {
        alert("كلمة السر خاطئة");
    }
}

</script>

</body>
</html>
