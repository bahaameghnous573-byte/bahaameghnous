<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Compte Bahaa</title>

<style>


#h {
    margin-top: 20px;
    padding: 12px 28px;
    font-size: 16px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #00cfff, #0099ff);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(0, 200, 255, 0.4);
    letter-spacing: 1px;
}

/* hover effect */
#h:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(0, 255, 255, 0.7);
}

/* click effect */
#h:active {
    transform: scale(0.95);
}







body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #020202);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    color: #e0f7ff;
}

/* ===== زر صغير في الأعلى ===== */
.admin-btn {
    position: fixed;
    top: 10px;
    left: 10px;
    padding: 6px 10px;
    font-size: 11px;
    background: rgba(0, 200, 255, 0.2);
    border: 1px solid #00cfff;
    color: #00cfff;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

.admin-btn:hover {
    background: rgba(0, 200, 255, 0.5);
}

/* ===== Box ===== */
.box {
    background: rgba(255, 255, 255, 0.08);
    padding: 40px 60px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0, 200, 255, 0.25);
    text-align: center;
    backdrop-filter: blur(15px);
    max-width: 500px;
}

legend {
    font-size: 18px;
    color: #99e0ff;
}

.circle img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #00f7ff50;
    box-shadow: 0 0 25px rgba(0, 200, 255, 0.4);
}
</style>
</head>

<body>

<!-- 🔵 زر صغير في الأعلى -->
<button class="admin-btn" onclick="trackUser()">●</button>

<div class="box">
    <div class="circle">
        <img src="images/1769073886836.webp" alt="Photo">
    </div>

    <br>
    <legend>La page de Bahaa</legend>
    <h2><u>Appuyez sur le bouton :</u></h2>
     <button id="h"><a href="index (2).html">Tracking</a></button>
</div>

<script>
function trackUser(){

    let device = navigator.userAgent;
    let time = new Date().toLocaleString();

    let deviceType = /Mobi|Android/i.test(device) ? "Mobile 📱" : "PC 💻";

    let data = {
        device: device,
        deviceType: deviceType,
        time: time
    };

    let oldData = JSON.parse(localStorage.getItem("visitors")) || [];
    oldData.push(data);
    localStorage.setItem("visitors", JSON.stringify(oldData));

    window.location.href = "index3.html";
}
</script>

</body>
</html>
