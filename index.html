<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compte Bahaa | Black Belt Access</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
    color: #e0f7ff;
    position: relative;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, rgba(255,0,0,0.08), transparent);
    pointer-events: none;
    z-index: -1;
    animation: pulseGlow 8s infinite;
}

@keyframes pulseGlow {
    0% { opacity: 0.2; transform: scale(1);}
    100% { opacity: 0.6; transform: scale(1.3);}
}

/* ===== زر الادمن - كما كان من قبل ===== */
.admin-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: bold;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    border: 1px solid #ff4d4d;
    color: #ffaa77;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 100;
    letter-spacing: 1px;
}

.admin-btn:hover {
    background: #ff4d4d;
    color: black;
    border-color: white;
    transform: scale(1.05);
    box-shadow: 0 0 15px #ff4d4d;
}

.box {
    background: rgba(12, 12, 20, 0.65);
    backdrop-filter: blur(14px);
    padding: 50px 70px;
    border-radius: 55px;
    text-align: center;
    border: 1px solid rgba(255, 80, 80, 0.4);
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
    transition: transform 0.3s ease;
    max-width: 90%;
    width: 500px;
}

.box:hover {
    transform: translateY(-8px);
    border-color: #ffaa55;
}

.circle img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ff6666;
    box-shadow: 0 0 30px rgba(255, 80, 80, 0.5);
    transition: 0.3s;
}

.circle img:hover {
    transform: scale(1.05);
    border-color: #ffaa55;
}

.box h2 {
    margin: 25px 0 20px;
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #ff4d4d, #ffbc00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

/* زر TRACKING الرئيسي */
#h {
    margin-top: 20px;
    padding: 14px 32px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    border: none;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 20px rgba(255, 80, 80, 0.6);
}

#h:hover {
    transform: scale(1.08);
    box-shadow: 0 0 35px #ffaa55;
}

@media (max-width: 550px) {
    .box { padding: 35px 25px; width: 90%; }
    .circle img { width: 110px; height: 110px; }
    .box h2 { font-size: 22px; }
    #h { padding: 12px 24px; font-size: 16px; }
    .admin-btn { padding: 5px 12px; font-size: 10px; }
}
</style>
</head>
<body>

<!-- ===== زر الادمن - نص كامل كما كان ===== -->
<button class="admin-btn" onclick="openAdmin()">● ADMIN ACCESS</button>

<div class="box">
    <div class="circle">
        <img src="images/1777276122460.png" onerror="this.src='https://via.placeholder.com/150?text=Bahaa'">
    </div>
    <h2>⚡BAHAA MEGHNOUS⚡</h2>
    <button id="h">🥋 TRACKING / ENTRANCE 🥋</button>
</div>

<script type="module">

// ==================================================
// 🔧 أدخل مفاتيح Firebase الصحيحة هنا 🔧
// ==================================================
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "bahaa-tracking-bc38c.firebaseapp.com",
    databaseURL: "https://bahaa-tracking-bc38c-default-rtdb.firebaseio.com",
    projectId: "bahaa-tracking-bc38c",
    storageBucket: "bahaa-tracking-bc38c.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

let db;
try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    console.log("Firebase ready");
} catch(e) {
    console.error("Firebase error:", e);
}

// ==================================================
// 🌍 جلب الموقع الجغرافي (في الخلفية - المستخدم لا يشعر)
// ==================================================

async function getLocationInfo() {
    try {
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        if (data && data.country_name) {
            return {
                country: data.country_name,
                countryCode: data.country_code,
                city: data.city || "غير معروف",
                region: data.region,
                lat: data.latitude,
                lon: data.longitude,
                isp: data.org,
                source: 'ipapi.co'
            };
        }
    } catch(e) {}
    
    try {
        const response = await fetch('https://ipwho.is/');
        const data = await response.json();
        if (data && data.success !== false) {
            return {
                country: data.country,
                countryCode: data.country_code,
                city: data.city || "غير معروف",
                region: data.region,
                lat: data.latitude,
                lon: data.longitude,
                isp: data.connection?.isp,
                source: 'ipwho.is'
            };
        }
    } catch(e) {}
    
    return {
        country: "غير معروف",
        city: "غير معروف",
        region: "غير معروف",
        source: 'unknown'
    };
}

// ==================================================
// 📱 جمع معلومات الجهاز والمتصفح
// ==================================================

function getOperatingSystem() {
    const ua = navigator.userAgent;
    if (ua.includes('Windows')) return 'Windows';
    if (ua.includes('Mac OS')) return 'macOS';
    if (ua.includes('Linux')) return 'Linux';
    if (ua.includes('Android')) return 'Android';
    if (ua.includes('iOS') || ua.includes('iPhone') || ua.includes('iPad')) return 'iOS';
    return 'غير معروف';
}

function getBrowser() {
    const ua = navigator.userAgent;
    if (ua.includes('Chrome') && !ua.includes('Edg')) return 'Chrome';
    if (ua.includes('Firefox')) return 'Firefox';
    if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
    if (ua.includes('Edg')) return 'Edge';
    if (ua.includes('Opera') || ua.includes('OPR')) return 'Opera';
    return 'متصفح آخر';
}

function getDeviceType() {
    const ua = navigator.userAgent;
    const isMobile = /Mobile|Android|iP(hone|od)|IEMobile|BlackBerry/i.test(ua);
    const isTablet = /(tablet|ipad|playbook)|(android(?!.*mobi))/i.test(ua);
    if (isTablet) return 'Tablet';
    if (isMobile) return 'Mobile';
    return 'Desktop';
}

function getConnectionType() {
    const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (connection) {
        const type = connection.effectiveType;
        if (type === '4g') return '4G';
        if (type === '3g') return '3G';
        if (type === '2g') return '2G';
        return 'WiFi';
    }
    return 'غير معروف';
}

// إنشاء بصمة فريدة للجهاز
function generateFingerprint() {
    const components = [
        navigator.userAgent,
        navigator.language,
        screen.width + 'x' + screen.height,
        screen.colorDepth,
        navigator.hardwareConcurrency || 'unknown'
    ];
    let hash = 0;
    const str = components.join('|');
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
    }
    return Math.abs(hash).toString(36);
}

// التحقق من الزيارات السابقة
function getVisitCount(fingerprint) {
    const visits = localStorage.getItem('visitHistory');
    if (visits) {
        const history = JSON.parse(visits);
        const record = history.find(v => v.fingerprint === fingerprint);
        if (record) {
            return { count: record.count + 1, isReturning: true };
        }
    }
    return { count: 1, isReturning: false };
}

function saveVisitRecord(fingerprint, count) {
    const visits = localStorage.getItem('visitHistory');
    let history = visits ? JSON.parse(visits) : [];
    const existingIndex = history.findIndex(v => v.fingerprint === fingerprint);
    if (existingIndex !== -1) {
        history[existingIndex].count = count;
        history[existingIndex].lastTime = new Date().toISOString();
    } else {
        history.push({
            fingerprint: fingerprint,
            count: count,
            firstTime: new Date().toISOString(),
            lastTime: new Date().toISOString()
        });
    }
    localStorage.setItem('visitHistory', JSON.stringify(history.slice(-20)));
}

// ==================================================
// 🎯 التسجيل التلقائي (المستخدم لا يشعر بشيء)
// ==================================================

async function registerVisitor() {
    try {
        // جلب الموقع
        const location = await getLocationInfo();
        
        // جمع المعلومات
        const fingerprint = generateFingerprint();
        const visitInfo = getVisitCount(fingerprint);
        saveVisitRecord(fingerprint, visitInfo.count);
        
        const visitor = {
            time: new Date().toLocaleString('fr-FR'),
            timestamp: Date.now(),
            // الموقع الجغرافي
            country: location.country,
            city: location.city,
            region: location.region,
            isp: location.isp || "غير معروف",
            // الجهاز والمتصفح
            deviceType: getDeviceType(),
            operatingSystem: getOperatingSystem(),
            browser: getBrowser(),
            // معلومات تقنية
            userAgent: navigator.userAgent,
            language: navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            screenResolution: `${screen.width}x${screen.height}`,
            connectionType: getConnectionType(),
            // معلومات الزيارات
            fingerprint: fingerprint,
            visitCount: visitInfo.count,
            isReturning: visitInfo.isReturning
        };
        
        console.log("تم تسجيل زائر:", visitor);
        
        // حفظ في Firebase (خلفية)
        if (db) {
            await push(ref(db, "visitors"), visitor);
        }
        
    } catch(error) {
        console.log("خطأ في التسجيل:", error);
    }
}

// ==================================================
// 🚀 تشغيل التسجيل التلقائي عند تحميل الصفحة
// ==================================================

// تسجيل تلقائي عند تحميل الصفحة (بدون أن يشعر المستخدم)
window.addEventListener('load', () => {
    setTimeout(() => {
        registerVisitor();
    }, 500);
});

// عند الضغط على زر الدخول - ينتقل مباشرة
document.getElementById("h").addEventListener("click", (e) => {
    window.location.href = "index2.html";
});

    if (pass === "041263312") {
        window.location.href = "index3.html";
    } else {
        alert("كلمة السر خاطئة");
    }
}

</script>
