<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم - الزوار</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#050505,#0f172a);
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    color:#00e5ff;
    margin-bottom:25px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    overflow:hidden;
}

th{
    background:#00cfff;
    color:black;
    padding:12px;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

tr:hover{
    background:rgba(0,255,255,0.08);
}

.actions{
    text-align:center;
    margin-top:20px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin:5px;
}

.clear{
    background:#ff3b3b;
    color:white;
}

.back{
    background:#00cfff;
    color:black;
}

.loading{
    text-align:center;
    margin-top:20px;
    color:#aaa;
}

</style>
</head>

<body>

<h1>📊 لوحة الزوار (Firebase)</h1>

<table>
    <thead>
        <tr>
            <th>الوقت</th>
            <th>نوع الجهاز</th>
            <th>تفاصيل الجهاز</th>
        </tr>
    </thead>

    <tbody id="dataTable"></tbody>
</table>

<div class="loading" id="loading">جاري تحميل البيانات...</div>

<div class="actions">
    <button class="clear" onclick="clearData()">حذف كل البيانات</button>
    <button class="back" onclick="goBack()">رجوع</button>
</div>

<!-- ========== FIREBASE ========== -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "bahaa-tracking-bc38c.firebaseapp.com",
    databaseURL: "https://bahaa-tracking-bc38c-default-rtdb.firebaseio.com",
    projectId: "bahaa-tracking-bc38c",
    storageBucket: "bahaa-tracking-bc38c.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const table = document.getElementById("dataTable");
const loading = document.getElementById("loading");

// 📊 قراءة البيانات مباشرة من Firebase
const visitorsRef = ref(db, "visitors");

onValue(visitorsRef, (snapshot) => {

    table.innerHTML = "";
    loading.style.display = "none";

    if (!snapshot.exists()) {
        table.innerHTML = `
            <tr>
                <td colspan="3">لا توجد بيانات</td>
            </tr>
        `;
        return;
    }

    snapshot.forEach(child => {
        const data = child.val();

        table.innerHTML += `
        <tr>
            <td>${data.time || "-"}</td>
            <td>${data.type || "-"}</td>
            <td style="font-size:12px;">${data.device || "-"}</td>
        </tr>
        `;
    });

});

// 🗑️ حذف البيانات
window.clearData = function(){
    if(confirm("هل تريد حذف كل البيانات؟")){
        remove(ref(db, "visitors"));
    }
}

// 🔙 رجوع
window.goBack = function(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
