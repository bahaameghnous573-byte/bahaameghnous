<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - الزوار | Bahaa Admin</title>

<style>
/* ===== RESET & BASE ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
    background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
    color: #eee;
    min-height: 100vh;
    padding: 40px 20px;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, rgba(255,0,0,0.08), transparent);
    pointer-events: none;
    z-index: -1;
    animation: pulseGlow 8s infinite;
}

@keyframes pulseGlow {
    0% { opacity: 0.2; transform: scale(1);}
    100% { opacity: 0.6; transform: scale(1.3);}
}

.container {
    max-width: 1400px;
    margin: 0 auto;
}

/* Stats Cards */
.stats-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 35px;
}

.stat-card {
    background: rgba(12, 12, 20, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 25px;
    padding: 20px;
    text-align: center;
    border: 1px solid rgba(255, 80, 80, 0.3);
    transition: 0.3s;
}

.stat-card:hover {
    transform: translateY(-5px);
    border-color: #ffaa55;
}

.stat-number {
    font-size: 2.5rem;
    font-weight: bold;
    background: linear-gradient(135deg, #ff4d4d, #ffbc00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.stat-label {
    font-size: 0.85rem;
    color: #ffaa88;
    margin-top: 8px;
    letter-spacing: 1px;
}

h1 {
    text-align: center;
    font-size: clamp(24px, 5vw, 38px);
    font-weight: 800;
    background: linear-gradient(135deg, #ff4d4d, #ffbc00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 35px;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}

h1::before {
    content: "🥋";
    font-size: 40px;
    background: none;
    color: #ffaa55;
}

h1::after {
    content: "🏆";
    font-size: 40px;
    background: none;
    color: #ffaa55;
}

.table-wrapper {
    background: rgba(12, 12, 20, 0.6);
    backdrop-filter: blur(12px);
    border-radius: 28px;
    border: 1px solid rgba(255, 80, 80, 0.3);
    overflow-x: auto;
    box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 900px;
}

th {
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    color: #0a0a0a;
    padding: 18px 12px;
    font-weight: 800;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}

td {
    padding: 15px 12px;
    text-align: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    font-size: 0.85rem;
    word-break: break-word;
}

tr:hover td {
    background: rgba(255, 80, 80, 0.1);
}

.country-flag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.loading {
    text-align: center;
    padding: 40px;
    color: #ffaa77;
    font-size: 1.1rem;
    background: rgba(0,0,0,0.4);
    border-radius: 30px;
    margin-top: 20px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
}

.actions {
    text-align: center;
    margin-top: 35px;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

button {
    padding: 12px 32px;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1rem;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
}

.clear {
    background: linear-gradient(135deg, #ff3b3b, #cc0000);
    color: white;
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
}

.clear:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #ff5555;
}

.back {
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    color: #0a0a0a;
    box-shadow: 0 0 15px rgba(255, 170, 0, 0.4);
}

.back:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #ffcc55;
}

.refresh {
    background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
    color: #ffaa88;
    border: 1px solid #ffaa55;
}

.refresh:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #3a3a5a, #2a2a4a);
}

.empty-row td {
    padding: 50px;
    color: #ffaa77;
    font-size: 1.2rem;
    text-align: center;
}

.badge {
    background: rgba(255, 80, 80, 0.3);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
}

@media (max-width: 768px) {
    body { padding: 20px 12px; }
    th, td { padding: 10px 8px; font-size: 0.7rem; }
    button { padding: 10px 20px; font-size: 0.85rem; }
}
</style>
</head>
<body>

<div class="container">
    <h1>📊 لوحة الزوار | الموقع التقريبي</h1>

    <!-- إحصائيات سريعة -->
    <div class="stats-container" id="statsContainer">
        <div class="stat-card">
            <div class="stat-number" id="totalVisitors">0</div>
            <div class="stat-label">إجمالي الزوار</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="todayVisitors">0</div>
            <div class="stat-label">زوار اليوم</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="mobileCount">0</div>
            <div class="stat-label">جوال 📱</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="pcCount">0</div>
            <div class="stat-label">كمبيوتر 💻</div>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>⏱️ الوقت</th>
                    <th>📱 النوع</th>
                    <th>🌍 البلد</th>
                    <th>🏙️ المدينة</th>
                    <th>🌐 اللغة</th>
                    <th>⏰ التوقيت</th>
                    <th>🖥️ التفاصيل</th>
                </tr>
            </thead>
            <tbody id="dataTable"></tbody>
        </table>
    </div>

    <div class="loading" id="loading">📡 جاري تحميل البيانات...</div>

    <div class="actions">
        <button class="refresh" onclick="refreshData()">🔄 تحديث</button>
        <button class="clear" onclick="clearData()">🗑️ حذف كل البيانات</button>
        <button class="back" onclick="goBack()">🔙 رجوع</button>
    </div>
</div>

<script type="module">

// ==================================================
// 🔧 أدخل مفاتيح Firebase الصحيحة هنا (نفس المفاتيح من الصفحة الأولى) 🔧
// ==================================================
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "bahaa-tracking-bc38c.firebaseapp.com",
    databaseURL: "https://bahaa-tracking-bc38c-default-rtdb.firebaseio.com",
    projectId: "bahaa-tracking-bc38c",
    storageBucket: "bahaa-tracking-bc38c.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const table = document.getElementById("dataTable");
const loading = document.getElementById("loading");
const visitorsRef = ref(db, "visitors");

// دالة لعرض البيانات
function loadData() {
    loading.style.display = "block";
    
    onValue(visitorsRef, (snapshot) => {
        table.innerHTML = "";
        loading.style.display = "none";

        if (!snapshot.exists()) {
            table.innerHTML = `<tr class="empty-row"><td colspan="7">✨ لا توجد زيارات مسجلة بعد ✨</td></tr>`;
            updateStats({});
            return;
        }

        const visitors = [];
        snapshot.forEach(child => {
            visitors.push({ id: child.key, ...child.val() });
        });

        // ترتيب من الأحدث إلى الأقدم
        visitors.reverse();

        // تحديث الإحصائيات
        updateStats(visitors);

        // عرض البيانات في الجدول
        visitors.forEach(visitor => {
            const countryFlag = getCountryFlag(visitor.country);
            table.innerHTML += `
                <tr>
                    <td>${visitor.time || "-"}</td>
                    <td>${visitor.type || "-"}</td>
                    <td class="country-flag">${countryFlag} ${visitor.country || "-"}</td>
                    <td>${visitor.city || "-"} ${visitor.city !== "-" ? "🏙️" : ""}</td>
                    <td>${visitor.language || "-"} 🌐</td>
                    <td>${visitor.timezone || "-"} ⏰</td>
                    <td style="font-size:10px; max-width:200px;">${visitor.device ? visitor.device.substring(0, 50) + "..." : "-"}</td>
                </tr>
            `;
        });
    }, (error) => {
        console.error("Firebase error:", error);
        loading.innerHTML = "❌ خطأ في الاتصال بقاعدة البيانات";
        loading.style.display = "block";
    });
}

// دالة للحصول على علم البلد
function getCountryFlag(countryName) {
    const flags = {
        'Algeria': '🇩🇿', 'France': '🇫🇷', 'Tunisia': '🇹🇳', 'Morocco': '🇲🇦',
        'Egypt': '🇪🇬', 'Saudi Arabia': '🇸🇦', 'UAE': '🇦🇪', 'Qatar': '🇶🇦',
        'Kuwait': '🇰🇼', 'Jordan': '🇯🇴', 'Lebanon': '🇱🇧', 'Palestine': '🇵🇸',
        'Iraq': '🇮🇶', 'Syria': '🇸🇾', 'Libya': '🇱🇾', 'Mauritania': '🇲🇷',
        'Sudan': '🇸🇩', 'Somalia': '🇸🇴', 'Comoros': '🇰🇲', 'Djibouti': '🇩🇯'
    };
    
    for (const [country, flag] of Object.entries(flags)) {
        if (countryName && countryName.includes(country)) {
            return flag;
        }
    }
    return '🌍';
}

// دالة تحديث الإحصائيات
function updateStats(visitors) {
    const total = visitors.length || 0;
    
    // زوار اليوم
    const today = new Date().toLocaleDateString();
    const todayVisitors = visitors.filter(v => {
        if (v.time) {
            const visitorDate = new Date(v.time).toLocaleDateString();
            return visitorDate === today;
        }
        return false;
    }).length;
    
    // عدد أجهزة الجوال والكمبيوتر
    const mobileCount = visitors.filter(v => v.type && v.type.includes('Mobile')).length;
    const pcCount = visitors.filter(v => v.type && v.type.includes('Desktop')).length;
    
    document.getElementById("totalVisitors").innerHTML = total;
    document.getElementById("todayVisitors").innerHTML = todayVisitors;
    document.getElementById("mobileCount").innerHTML = mobileCount;
    document.getElementById("pcCount").innerHTML = pcCount;
}

// تحديث البيانات يدوياً
window.refreshData = function() {
    loadData();
}

// حذف جميع البيانات
window.clearData = function() {
    if(confirm("⚠️ هل أنت متأكد من حذف كل بيانات الزوار؟")) {
        loading.style.display = "block";
        remove(ref(db, "visitors")).then(() => {
            loading.style.display = "none";
            alert("✅ تم حذف جميع البيانات بنجاح");
            loadData();
        }).catch(error => {
            console.error("Delete error:", error);
            alert("❌ حدث خطأ أثناء الحذف");
            loading.style.display = "none";
        });
    }
}

// الرجوع إلى الصفحة الرئيسية
window.goBack = function() {
    window.location.href = "index.html";
}

// تحميل البيانات عند فتح الصفحة
loadData();

</script>

</body>
</html>
