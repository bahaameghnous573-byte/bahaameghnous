<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Bahaa Tracking</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
    background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
    color: #eee;
    min-height: 100vh;
    padding: 20px;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, rgba(255,0,0,0.08), transparent);
    pointer-events: none;
    z-index: -1;
    animation: pulseGlow 8s infinite;
}

@keyframes pulseGlow {
    0% { opacity: 0.2; transform: scale(1);}
    100% { opacity: 0.6; transform: scale(1.3);}
}

.container {
    max-width: 1600px;
    margin: 0 auto;
}

h1 {
    text-align: center;
    font-size: clamp(24px, 5vw, 38px);
    font-weight: 800;
    background: linear-gradient(135deg, #ff4d4d, #ffbc00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}

h1::before { content: "🥋"; font-size: 40px; color: #ffaa55; }
h1::after { content: "🏆"; font-size: 40px; color: #ffaa55; }

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    margin-bottom: 30px;
}

.stat-card {
    background: rgba(12, 12, 20, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 15px;
    text-align: center;
    border: 1px solid rgba(255, 80, 80, 0.3);
    transition: 0.3s;
}

.stat-card:hover {
    transform: translateY(-3px);
    border-color: #ffaa55;
}

.stat-number {
    font-size: 2rem;
    font-weight: bold;
    background: linear-gradient(135deg, #ff4d4d, #ffbc00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.stat-label {
    font-size: 0.7rem;
    color: #ffaa88;
    margin-top: 5px;
}

.filter-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.filter-btn {
    padding: 8px 16px;
    border: none;
    border-radius: 30px;
    background: rgba(255, 80, 80, 0.2);
    color: #ffaa88;
    cursor: pointer;
    transition: 0.3s;
}

.filter-btn:hover, .filter-btn.active {
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    color: #000;
}

.table-wrapper {
    background: rgba(12, 12, 20, 0.6);
    backdrop-filter: blur(12px);
    border-radius: 25px;
    overflow-x: auto;
    border: 1px solid rgba(255, 80, 80, 0.3);
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 1400px;
}

th {
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    color: #000;
    padding: 12px 8px;
    font-weight: bold;
    font-size: 0.7rem;
    text-transform: uppercase;
    position: sticky;
    top: 0;
}

td {
    padding: 12px 8px;
    text-align: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    font-size: 0.7rem;
    vertical-align: middle;
}

tr:hover td {
    background: rgba(255, 80, 80, 0.1);
}

.visit-count-badge {
    display: inline-block;
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    color: #000;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 30px;
    font-size: 0.8rem;
    min-width: 40px;
}

.visit-count-high {
    background: linear-gradient(135deg, #ffaa00, #ff6600);
    box-shadow: 0 0 10px rgba(255,170,0,0.5);
}

.country-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

.country-flag {
    font-size: 1.2rem;
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: rgba(20,20,40,0.98);
    backdrop-filter: blur(15px);
    border-radius: 30px;
    padding: 30px;
    max-width: 550px;
    width: 90%;
    max-height: 85%;
    overflow-y: auto;
    border: 2px solid #ffaa55;
    box-shadow: 0 0 40px rgba(255,170,0,0.3);
}

.modal-content h3 {
    color: #ffaa66;
    margin-bottom: 20px;
    text-align: center;
    font-size: 1.5rem;
}

.modal-content .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.modal-content .detail-label {
    font-weight: bold;
    color: #ffaa88;
    width: 40%;
}

.modal-content .detail-value {
    color: #fff;
    width: 55%;
    word-break: break-word;
    text-align: left;
}

.close-modal {
    display: block;
    margin: 25px auto 0;
    padding: 10px 25px;
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    border: none;
    border-radius: 30px;
    color: #000;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.close-modal:hover {
    transform: scale(1.05);
}

.loading {
    text-align: center;
    padding: 40px;
    color: #ffaa77;
}

.actions {
    text-align: center;
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

button {
    padding: 10px 25px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    font-size: 0.9rem;
    transition: all 0.3s;
}

.clear {
    background: linear-gradient(135deg, #ff3b3b, #cc0000);
    color: white;
}

.back, .refresh {
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    color: #000;
}

.refresh {
    background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
    color: #ffaa88;
}

.badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 15px;
    font-size: 0.65rem;
    font-weight: bold;
}

.badge-return { background: #ffaa00; color: #000; }
.badge-new { background: #00aa44; color: #fff; }
.badge-mobile { background: #4a4aff; color: #fff; }
.badge-desktop { background: #aa44aa; color: #fff; }

.view-details {
    background: rgba(255,170,0,0.3);
    border: none;
    padding: 4px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.7rem;
    color: #ffaa88;
    transition: 0.2s;
    margin-right: 5px;
}

.view-details:hover {
    background: #ffaa00;
    color: #000;
}

.delete-single {
    background: rgba(255,50,50,0.3);
    border: none;
    padding: 4px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.7rem;
    color: #ff8888;
    transition: 0.2s;
}

.delete-single:hover {
    background: #ff3333;
    color: #fff;
    box-shadow: 0 0 10px #ff3333;
}

.actions-cell {
    display: flex;
    gap: 5px;
    justify-content: center;
    flex-wrap: wrap;
}

.notification {
    position: fixed;
    top: 20px;
    right: 20px;
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    color: #000;
    padding: 12px 20px;
    border-radius: 50px;
    font-weight: bold;
    z-index: 1100;
    animation: slideIn 0.5s ease, fadeOut 0.5s ease 3s forwards;
    box-shadow: 0 0 20px rgba(255,80,80,0.5);
}

@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

@media (max-width: 768px) {
    body { padding: 15px 10px; }
    th, td { padding: 6px 4px; font-size: 0.55rem; }
    .stat-number { font-size: 1.3rem; }
    .filter-btn { padding: 5px 10px; font-size: 0.7rem; }
    .modal-content .detail-label, .modal-content .detail-value { font-size: 0.75rem; }
    .visit-count-badge { font-size: 0.65rem; padding: 2px 6px; }
    .view-details, .delete-single { padding: 2px 6px; font-size: 0.6rem; }
}
</style>
</head>
<body>

<div class="container">
    <h1>📊 ADMIN DASHBOARD | Visitor Analytics</h1>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="totalVisitors">0</div><div class="stat-label">Total Visitors</div></div>
        <div class="stat-card"><div class="stat-number" id="todayVisitors">0</div><div class="stat-label">Today's Visitors</div></div>
        <div class="stat-card"><div class="stat-number" id="mobileCount">0</div><div class="stat-label">Mobile 📱</div></div>
        <div class="stat-card"><div class="stat-number" id="desktopCount">0</div><div class="stat-label">Desktop 💻</div></div>
        <div class="stat-card"><div class="stat-number" id="returningCount">0</div><div class="stat-label">Returning 🔄</div></div>
        <div class="stat-card"><div class="stat-number" id="countriesCount">0</div><div class="stat-label">Countries 🌍</div></div>
        <div class="stat-card"><div class="stat-number" id="ispCount">0</div><div class="stat-label">ISPs</div></div>
        <div class="stat-card"><div class="stat-number" id="totalVisitsCount">0</div><div class="stat-label">Total Visits 🔄</div></div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="mobile">Mobile Only</button>
        <button class="filter-btn" data-filter="desktop">Desktop Only</button>
        <button class="filter-btn" data-filter="returning">Returning Only</button>
        <button class="filter-btn" data-filter="today">Today Only</button>
        <button class="filter-btn" data-filter="highVisits">High Visits (>5)</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>⏱️ Time</th>
                    <th>📱 Device</th>
                    <th>💻 OS / Browser</th>
                    <th>🌍 Country / City</th>
                    <th>📡 ISP</th>
                    <th>🔄 Visits Count</th>
                    <th>📶 Connection / Screen</th>
                    <th>⚡ Actions</th>
                </tr>
            </thead>
            <tbody id="dataTable"></tbody>
        </table>
    </div>

    <div class="loading" id="loading">📡 Loading data...</div>

    <div class="actions">
        <button class="refresh" onclick="location.reload()">🔄 Refresh</button>
        <button class="clear" onclick="clearData()">🗑️ Delete All</button>
        <button class="back" onclick="window.location.href='index.html'">🔙 Back</button>
    </div>
</div>

<div class="modal" id="detailsModal">
    <div class="modal-content">
        <h3>📋 Visitor Full Details</h3>
        <div id="modalDetails"></div>
        <button class="close-modal" onclick="closeModal()">Close</button>
    </div>
</div>

<script type="module">

// ==================================================
// 🔧 Firebase Configuration - PUT YOUR REAL KEYS HERE
// ==================================================
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "bahaa-tracking-bc38c.firebaseapp.com",
    databaseURL: "https://bahaa-tracking-bc38c-default-rtdb.firebaseio.com",
    projectId: "bahaa-tracking-bc38c",
    storageBucket: "bahaa-tracking-bc38c.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, remove, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let allVisitors = [];
let currentFilter = 'all';
let previousCount = 0;

const countryFlags = {
    'Algeria': '🇩🇿', 'France': '🇫🇷', 'Tunisia': '🇹🇳', 'Morocco': '🇲🇦',
    'Egypt': '🇪🇬', 'Saudi Arabia': '🇸🇦', 'USA': '🇺🇸', 'Canada': '🇨🇦',
    'Germany': '🇩🇪', 'Italy': '🇮🇹', 'Spain': '🇪🇸', 'UK': '🇬🇧',
    'Turkey': '🇹🇷', 'UAE': '🇦🇪', 'Qatar': '🇶🇦', 'Kuwait': '🇰🇼',
    'Russia': '🇷🇺', 'China': '🇨🇳', 'Japan': '🇯🇵', 'Brazil': '🇧🇷',
    'Australia': '🇦🇺', 'Netherlands': '🇳🇱', 'Sweden': '🇸🇪', 'Norway': '🇳🇴',
    'Switzerland': '🇨🇭', 'Belgium': '🇧🇪', 'Portugal': '🇵🇹', 'Greece': '🇬🇷',
    'Libya': '🇱🇾', 'Mauritania': '🇲🇷', 'Sudan': '🇸🇩', 'Palestine': '🇵🇸',
    'Jordan': '🇯🇴', 'Lebanon': '🇱🇧', 'Iraq': '🇮🇶', 'Syria': '🇸🇾', 'Unknown': '🌍'
};

function getFlag(country) {
    if (!country) return '🌍';
    for (const [c, flag] of Object.entries(countryFlags)) {
        if (country.includes(c)) return flag;
    }
    return '🌍';
}

function showNotification(message, isError = false) {
    const notification = document.createElement('div');
    notification.className = 'notification';
    notification.innerHTML = message;
    if (isError) {
        notification.style.background = "linear-gradient(135deg, #cc0000, #ff3333)";
    }
    notification.style.animation = 'slideIn 0.5s ease, fadeOut 0.5s ease 2.5s forwards';
    document.body.appendChild(notification);
    setTimeout(() => {
        if (notification && notification.remove) notification.remove();
    }, 3000);
}

function updateStats(visitors) {
    const total = visitors.length;
    const today = new Date().toLocaleDateString();
    const todayCount = visitors.filter(v => v.time && new Date(v.time).toLocaleDateString() === today).length;
    const mobileCount = visitors.filter(v => v.deviceType === 'Mobile' || (v.deviceType && v.deviceType.includes('Mobile'))).length;
    const desktopCount = total - mobileCount;
    const returningCount = visitors.filter(v => v.isReturning === true).length;
    const uniqueCountries = new Set(visitors.map(v => v.country).filter(c => c && c !== 'Unknown')).size;
    const uniqueISPs = new Set(visitors.map(v => v.isp).filter(isp => isp && isp !== "Unknown" && isp !== "-")).size;
    const totalVisitsCount = visitors.reduce((sum, v) => sum + (v.visitCount || 1), 0);
    
    document.getElementById('totalVisitors').innerHTML = total;
    document.getElementById('todayVisitors').innerHTML = todayCount;
    document.getElementById('mobileCount').innerHTML = mobileCount;
    document.getElementById('desktopCount').innerHTML = desktopCount;
    document.getElementById('returningCount').innerHTML = returningCount;
    document.getElementById('countriesCount').innerHTML = uniqueCountries;
    document.getElementById('ispCount').innerHTML = uniqueISPs;
    document.getElementById('totalVisitsCount').innerHTML = totalVisitsCount;
    
    if (visitors.length > previousCount && previousCount > 0) {
        const newVisitor = visitors[0];
        if (newVisitor) {
            showNotification(`🆕 New Visitor! ${getFlag(newVisitor.country)} ${newVisitor.country || 'Unknown'} - ${newVisitor.city || 'Unknown'}`);
        }
    }
    previousCount = visitors.length;
}

window.showDetails = function(visitor) {
    const modal = document.getElementById('detailsModal');
    const modalDetails = document.getElementById('modalDetails');
    const visitCountClass = (visitor.visitCount || 1) > 3 ? 'visit-count-high' : '';
    
    modalDetails.innerHTML = `
        <div class="detail-row"><span class="detail-label">📅 Date & Time:</span><span class="detail-value">${visitor.time || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">🕐 Timestamp:</span><span class="detail-value">${visitor.timestamp || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">🌍 Country:</span><span class="detail-value"><span class="country-flag">${getFlag(visitor.country)}</span> ${visitor.country || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">🏙️ City:</span><span class="detail-value">${visitor.city || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">📍 Region:</span><span class="detail-value">${visitor.region || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">📡 ISP (Provider):</span><span class="detail-value"><strong style="color:#ffaa55;">${visitor.isp || 'Unknown'}</strong></span></div>
        <div class="detail-row"><span class="detail-label">📱 Device Type:</span><span class="detail-value">${visitor.deviceType || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">💻 Operating System:</span><span class="detail-value">${visitor.operatingSystem || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">🌐 Browser:</span><span class="detail-value">${visitor.browser || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">🖥️ Screen Resolution:</span><span class="detail-value">${visitor.screenResolution || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">📶 Connection Type:</span><span class="detail-value">${visitor.connectionType || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">🌐 Language:</span><span class="detail-value">${visitor.language || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">⏰ Timezone:</span><span class="detail-value">${visitor.timezone || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">🔄 Visit Count:</span><span class="detail-value"><span class="visit-count-badge ${visitCountClass}">${visitor.visitCount || 1} times</span></span></div>
        <div class="detail-row"><span class="detail-label">🏷️ Returning Visitor:</span><span class="detail-value">${visitor.isReturning ? '✅ Yes' : '❌ No (First visit)'}</span></div>
        <div class="detail-row"><span class="detail-label">🔑 Fingerprint:</span><span class="detail-value"><small>${visitor.fingerprint || '-'}</small></span></div>
        <div class="detail-row"><span class="detail-label">📝 User Agent:</span><span class="detail-value"><small>${visitor.userAgent ? visitor.userAgent.substring(0, 120) + '...' : '-'}</small></span></div>
    `;
    modal.style.display = 'flex';
}

window.closeModal = function() {
    document.getElementById('detailsModal').style.display = 'none';
}

// ==================================================
// 🗑️ NEW: Delete single visitor
// ==================================================
window.deleteVisitor = function(visitorId, visitorName) {
    if(confirm(`⚠️ Are you sure you want to delete visitor from ${visitorName || 'Unknown'}? This cannot be undone!`)) {
        const visitorRef = ref(db, `visitors/${visitorId}`);
        remove(visitorRef).then(() => {
            showNotification(`🗑️ Visitor from ${visitorName || 'Unknown'} has been deleted!`);
        }).catch((error) => {
            console.error("Error deleting visitor:", error);
            showNotification(`❌ Error deleting visitor: ${error.message}`, true);
        });
    }
}

function renderTable() {
    const tbody = document.getElementById('dataTable');
    tbody.innerHTML = '';
    
    let filtered = [...allVisitors];
    
    if (currentFilter === 'mobile') {
        filtered = filtered.filter(v => v.deviceType === 'Mobile' || (v.deviceType && v.deviceType.includes('Mobile')));
    } else if (currentFilter === 'desktop') {
        filtered = filtered.filter(v => v.deviceType === 'Desktop' || (v.deviceType && v.deviceType.includes('Desktop')));
    } else if (currentFilter === 'returning') {
        filtered = filtered.filter(v => v.isReturning === true);
    } else if (currentFilter === 'today') {
        const today = new Date().toLocaleDateString();
        filtered = filtered.filter(v => v.time && new Date(v.time).toLocaleDateString() === today);
    } else if (currentFilter === 'highVisits') {
        filtered = filtered.filter(v => (v.visitCount || 1) > 5);
    }
    
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="padding:40px;text-align:center;">✨ No visitors recorded yet ✨</td></tr>';
        return;
    }
    
    filtered.forEach((v) => {
        const returnBadge = v.isReturning ? '<span class="badge badge-return">🔄 Returning</span>' : '<span class="badge badge-new">✨ New</span>';
        const deviceBadge = v.deviceType === 'Mobile' ? '<span class="badge badge-mobile">📱 Mobile</span>' : '<span class="badge badge-desktop">💻 Desktop</span>';
        const visitCount = v.visitCount || 1;
        const visitCountClass = visitCount > 3 ? 'visit-count-high' : '';
        const visitCountDisplay = visitCount > 1 ? `${visitCount} times` : `${visitCount} time`;
        
        let ispShort = v.isp || '-';
        if (ispShort.length > 22) ispShort = ispShort.substring(0, 20) + '...';
        
        const visitorLocation = `${v.country || 'Unknown'} - ${v.city || 'Unknown'}`;
        
        tbody.innerHTML += `
            <tr>
                <td style="font-size:9px;">${v.time || '-'}</td>
                <td>${deviceBadge}</td>
                <td>${v.operatingSystem || '-'}<br><small>${v.browser || '-'}</small></td>
                <td class="country-cell">
                    <span class="country-flag">${getFlag(v.country)}</span>
                    ${v.country || '-'}<br>
                    <small>📍 ${v.city || '-'}</small><br>
                    <small>${v.language || '-'}</small>
                </td>
                <td style="text-align:left; direction:ltr;"><strong style="color:#ffaa55;">${ispShort}</strong><br><small>${v.connectionType || '-'}</small></td>
                <td>
                    <span class="visit-count-badge ${visitCountClass}">${visitCountDisplay}</span><br>
                    ${returnBadge}
                </td>
                <td>${v.screenResolution || '-'}<br><small>${v.timezone ? v.timezone.substring(0, 12) : '-'}</small></td>
                <td class="actions-cell">
                    <button class="view-details" onclick='showDetails(${JSON.stringify(v).replace(/'/g, "&#39;")})'>🔍 View</button>
                    <button class="delete-single" onclick='deleteVisitor("${v.id}", "${visitorLocation.replace(/"/g, '&quot;')}")'>🗑️ Delete</button>
                </td>
            </tr>
        `;
    });
}

// ==================================================
// Load data with real-time updates
// ==================================================
function loadData() {
    document.getElementById('loading').style.display = 'block';
    const visitorsRef = ref(db, 'visitors');
    
    onValue(visitorsRef, (snapshot) => {
        document.getElementById('loading').style.display = 'none';
        
        if (!snapshot.exists()) {
            allVisitors = [];
            document.getElementById('dataTable').innerHTML = '<tr><td colspan="8" style="padding:40px;text-align:center;">✨ No visitors recorded yet ✨</td></tr>';
            updateStats([]);
            return;
        }
        
        allVisitors = [];
        snapshot.forEach(child => {
            allVisitors.push({ id: child.key, ...child.val() });
        });
        
        allVisitors.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        
        updateStats(allVisitors);
        renderTable();
    });
}

// ==================================================
// Clear ALL data
// ==================================================
window.clearData = function() {
    if(confirm('⚠️ Are you sure you want to delete ALL visitor data? This cannot be undone!')) {
        const visitorsRef = ref(db, 'visitors');
        remove(visitorsRef).then(() => {
            showNotification('🗑️ All visitor data has been deleted successfully!');
            allVisitors = [];
            updateStats([]);
            renderTable();
        }).catch((error) => {
            console.error("Error deleting data:", error);
            showNotification('❌ Error deleting data: ' + error.message, true);
        });
    }
}

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter');
        renderTable();
    });
});

loadData();
</script>
