<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>لوحة التحكم - الزوار | Bahaa Admin</title>

<style>
/* ===== RESET & BASE ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
    background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
    color: #eee;
    min-height: 100vh;
    padding: 40px 20px;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, rgba(255,0,0,0.08), transparent);
    pointer-events: none;
    z-index: -1;
    animation: pulseGlow 8s infinite;
}

@keyframes pulseGlow {
    0% { opacity: 0.2; transform: scale(1);}
    100% { opacity: 0.6; transform: scale(1.3);}
}

.container {
    max-width: 1400px;
    margin: 0 auto;
}

h1 {
    text-align: center;
    font-size: clamp(24px, 5vw, 38px);
    font-weight: 800;
    background: linear-gradient(135deg, #ff4d4d, #ffbc00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 35px;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}

h1::before {
    content: "🥋";
    font-size: 40px;
    background: none;
    -webkit-background-cli: unset;
    color: #ffaa55;
}

h1::after {
    content: "🏆";
    font-size: 40px;
    background: none;
    -webkit-background-cli: unset;
    color: #ffaa55;
}

.table-wrapper {
    background: rgba(12, 12, 20, 0.6);
    backdrop-filter: blur(12px);
    border-radius: 28px;
    border: 1px solid rgba(255, 80, 80, 0.3);
    overflow-x: auto;
    box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 800px;
}

th {
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    color: #0a0a0a;
    padding: 18px 12px;
    font-weight: 800;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}

td {
    padding: 15px 12px;
    text-align: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    font-size: 0.85rem;
    word-break: break-word;
}

tr:hover td {
    background: rgba(255, 80, 80, 0.1);
}

td:last-child {
    font-size: 0.7rem;
    font-family: monospace;
    max-width: 250px;
    white-space: nowrap;
    overflow-x: auto;
}

.loading {
    text-align: center;
    padding: 40px;
    color: #ffaa77;
    font-size: 1.1rem;
    background: rgba(0,0,0,0.4);
    border-radius: 30px;
    margin-top: 20px;
}

.actions {
    text-align: center;
    margin-top: 35px;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

button {
    padding: 12px 32px;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1rem;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
}

.clear {
    background: linear-gradient(135deg, #ff3b3b, #cc0000);
    color: white;
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
}

.clear:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #ff5555;
}

.back {
    background: linear-gradient(135deg, #ff4d4d, #ffaa00);
    color: #0a0a0a;
    box-shadow: 0 0 15px rgba(255, 170, 0, 0.4);
}

.back:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #ffcc55;
}

.empty-row td {
    padding: 50px;
    color: #ffaa77;
    font-size: 1.2rem;
    text-align: center;
}

@media (max-width: 768px) {
    body { padding: 20px 12px; }
    th, td { padding: 10px 8px; font-size: 0.75rem; }
    button { padding: 10px 24px; font-size: 0.9rem; }
}
</style>
</head>
<body>

<div class="container">
    <h1>📊 لوحة الزوار | + الموقع التقريبي</h1>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>⏱️ الوقت</th>
                    <th>📱 النوع</th>
                    <th>🌍 البلد</th>
                    <th>🏙️ المدينة</th>
                    <th>🌐 اللغة</th>
                    <th>⏰ التوقيت</th>
                    <th>🖥️ التفاصيل</th>
                </tr>
            </thead>
            <tbody id="dataTable"></tbody>
         </table>
    </div>

    <div class="loading" id="loading">جاري تحميل البيانات...</div>

    <div class="actions">
        <button class="clear" onclick="clearData()">🗑️ حذف كل البيانات</button>
        <button class="back" onclick="goBack()">🔙 رجوع</button>
    </div>
</div>

<!-- ========== FIREBASE ========== -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "bahaa-tracking-bc38c.firebaseapp.com",
    databaseURL: "https://bahaa-tracking-bc38c-default-rtdb.firebaseio.com",
    projectId: "bahaa-tracking-bc38c",
    storageBucket: "bahaa-tracking-bc38c.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const table = document.getElementById("dataTable");
const loading = document.getElementById("loading");

const visitorsRef = ref(db, "visitors");

onValue(visitorsRef, (snapshot) => {
    table.innerHTML = "";
    loading.style.display = "none";

    if (!snapshot.exists()) {
        table.innerHTML = `<tr class="empty-row"><td colspan="7">✨ لا توجد زيارات مسجلة بعد ✨</td></tr>`;
        return;
    }

    snapshot.forEach(child => {
        const data = child.val();
        table.innerHTML += `
            <tr>
                <td>${data.time || "-"}</td>
                <td>${data.type || "-"}</td>
                <td>${data.country || "-"} 🌍</td>
                <td>${data.city || "-"} 🏙️</td>
                <td>${data.language || "-"} 🌐</td>
                <td>${data.timezone || "-"} ⏰</td>
                <td style="font-size:10px;">${data.device ? data.device.substring(0, 60)+"..." : "-"}</td>
            </tr>
        `;
    });
});

window.clearData = function(){
    if(confirm("⚠️ هل أنت متأكد من حذف كل بيانات الزوار؟")){
        remove(ref(db, "visitors"));
    }
}

window.goBack = function(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
